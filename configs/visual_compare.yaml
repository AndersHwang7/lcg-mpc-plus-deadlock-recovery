# 파일명: visual_compare.yaml
# 목적 및 역할:
# 그래프가 아니라 실제 도형 이동으로 WHCA와 LCG-MPC(CLrr_hmpc)를 비교하는 HTML 시각화 설정이다.
# 작성자: RODIX Anders Hwang

experiment:
  name: visual_compare
  output_dir: results/visualizations
  seeds: [0]
  algorithms: [whca, lcg_mpc_plus]

scenario:
  map_type: ring
  width: 58
  height: 58
  obstacle_density: 0.05
  n_robots: 56
  task_mode: one_shot
  max_steps: 140
  start_goal_mode: cross_traffic

planner:
  horizon: 8
  whca_window: 8
  activation_mode: candidate
  clrr_nominal: whca
  deadlock_threshold: 6
  conflict_radius: 1
  communication_radius: 8
  retreat_radius: 6
  repair_astar_expansions: 2000
  max_game_agents: 5
  game_max_profiles: 512
  game_w_delay: 1.0
  game_w_retreat: 1.8
  game_w_fairness: 1.35
  game_w_progress: 1.1
  enable_mpc: true
  enable_continuous_dynamics: true
  footprint_radius: 0.35
  safety_margin: 0.05
  sensing_sigma: 0.03
  uncertainty_k: 2.0
  max_speed: 1.25
  max_accel: 1.50
  enforce_acceleration_bound: true
  mpc_horizon: 6
  mpc_go_ratio: 0.70
  mpc_w_progress: 1.2
  mpc_w_wait: 0.25
  mpc_w_accel: 0.03

runtime:
  verbose: false
  save_step_log: false
