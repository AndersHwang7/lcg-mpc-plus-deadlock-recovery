# V3 manuscript-core 1000-seed protocol.
# Primary SCI claims should be limited to this paired 56/100 robot core.
experiment:
  name: paper_1000seed_core_v3
  output_dir: results/paper_1000seed_core_v3/raw
  seed_range: {start: 0, stop: 999}
  algorithms:
    - whca_default_h8
    - whca_best_preregistered
    - pibt
    - prioritized
    - impc_dr_lite
    - mpc_cbf_lite
    - lcg_mpc_plus_full_v3
  n_jobs: 1

sweep:
  n_robots: [56, 100]
  map_type: [ring, bottleneck, corridor, intersection, warehouse, random]
  density: [0.05]

scenario:
  width: 120
  height: 120
  obstacle_density: 0.05
  n_robots: 100
  task_mode: one_shot
  max_steps: 160
  start_goal_mode: cross_traffic

planner:
  horizon: 8
  whca_window: 8
  whca_strong_window: 32
  activation_mode: candidate
  clrr_nominal: whca
  deadlock_threshold: 6
  conflict_radius: 1
  communication_radius: 8
  retreat_radius: 6
  repair_astar_expansions: 1200
  max_game_agents: 5
  game_max_profiles: 128
  max_game_profiles_per_component: 128
  max_total_game_profiles_per_step: 512
  max_mpc_refinements_per_step: 4
  max_cbf_filter_calls_per_step: 1
  planner_step_timeout_ms: 250.0
  safe_fallback_on_timeout: true
  lcg_skip_whca_probe: true
  game_w_delay: 1.0
  game_w_retreat: 1.8
  game_w_fairness: 1.35
  game_w_progress: 1.1
  enable_mpc: true
  mpc_horizon: 6
  mpc_go_ratio: 0.70
  mpc_w_progress: 1.2
  mpc_w_wait: 0.25
  mpc_w_accel: 0.03
  enable_continuous_dynamics: true
  footprint_radius: 0.35
  safety_margin: 0.05
  sensing_sigma: 0.03
  uncertainty_k: 2.0
  max_speed: 1.25
  max_accel: 1.50
  enforce_acceleration_bound: true

runtime:
  verbose: false
  save_step_log: false
  resume_existing: true
  per_run_manifest: true
  baseline_metadata_note: "IMPC-DR-lite and MPC-CBF-lite are simulator-native surrogate baselines."
  guarantee_note: "Exact-potential guarantee is bounded to exact or partitioned-exact local games."
  safety_note: "collision_count=0 is a system-level outcome after the common safety supervisor."
