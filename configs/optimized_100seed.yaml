# 파일명: optimized_100seed.yaml
# 목적 및 역할:
# 20-seed pilot을 100-seed 논문용 paired 반복 실험으로 확장한다.
# 동일 seed는 모든 알고리즘에서 같은 지도/시작점/목표점을 사용한다.
# 작성자: RODIX Anders Hwang

experiment:
  name: optimized_100seed
  output_dir: results/raw
  seed_range: {start: 0, stop: 99}
  algorithms: [pibt, whca, orca_lite, dmpc_lite, mpc_cbf_lite, impc_dr_lite, clrr, clrr_game, clrr_hmpc, lcg_mpc_plus]
  n_jobs: 1

sweep:
  n_robots: [80, 100, 250]
  map_type: [intersection, corridor, bottleneck, ring, warehouse]
  density: [0.05]

scenario:
  width: 90
  height: 90
  obstacle_density: 0.05
  n_robots: 100
  task_mode: one_shot
  max_steps: 900
  start_goal_mode: cross_traffic

planner:
  horizon: 8
  whca_window: 8
  activation_mode: candidate
  clrr_nominal: whca
  deadlock_threshold: 6
  conflict_radius: 1
  communication_radius: 8
  retreat_radius: 6
  repair_astar_expansions: 2000
  max_game_agents: 5
  game_max_profiles: 512
  game_w_delay: 1.0
  game_w_retreat: 1.8
  game_w_fairness: 1.35
  game_w_progress: 1.1
  enable_mpc: true
  enable_continuous_dynamics: true
  footprint_radius: 0.35
  safety_margin: 0.05
  sensing_sigma: 0.03
  uncertainty_k: 2.0
  max_speed: 1.25
  max_accel: 1.50
  enforce_acceleration_bound: true
  mpc_horizon: 6
  mpc_go_ratio: 0.70
  mpc_w_progress: 1.2
  mpc_w_wait: 0.25
  mpc_w_accel: 0.03

runtime:
  verbose: false
  save_step_log: false
  resume_existing: true
