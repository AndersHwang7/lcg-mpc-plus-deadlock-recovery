# V3 100-seed ablation protocol for module-claim calibration.
experiment:
  name: paper_ablation_100seed_v3
  output_dir: results/paper_ablation_100seed_v3/raw
  seed_range: {start: 0, stop: 99}
  algorithms:
    - lcg_mpc_plus_without_robust_nominal
    - lcg_mpc_plus_without_game
    - lcg_mpc_plus_without_mpc
    - lcg_mpc_plus_without_cbf
    - lcg_mpc_plus_without_stagnation_repair
    - lcg_mpc_plus_without_safety_envelope_logging
    - lcg_mpc_plus_full_v3
  n_jobs: 1

sweep:
  n_robots: [56, 100]
  map_type: [ring, bottleneck, corridor, intersection, warehouse, random]
  density: [0.05]

scenario:
  width: 120
  height: 120
  obstacle_density: 0.05
  n_robots: 100
  task_mode: one_shot
  max_steps: 160
  start_goal_mode: cross_traffic

planner:
  whca_window: 8
  clrr_nominal: whca
  deadlock_threshold: 6
  repair_astar_expansions: 1200
  max_game_agents: 5
  game_max_profiles: 128
  max_game_profiles_per_component: 128
  max_total_game_profiles_per_step: 512
  max_mpc_refinements_per_step: 4
  max_cbf_filter_calls_per_step: 1
  planner_step_timeout_ms: 250.0
  safe_fallback_on_timeout: true
  lcg_skip_whca_probe: true
  enable_mpc: true
  mpc_horizon: 6
  enable_continuous_dynamics: true
  footprint_radius: 0.35
  safety_margin: 0.05
  uncertainty_k: 2.0
  max_speed: 1.25
  max_accel: 1.50
  enforce_acceleration_bound: true

runtime:
  verbose: false
  save_step_log: false
  resume_existing: true
