# Short benchmark for estimating the paper_fast_1000seed_core runtime.
experiment:
  name: paper_fast_1000seed_core_benchmark_3seed
  output_dir: results/paper_fast_1000seed_core_benchmark_3seed/raw
  seed_range: {start: 0, stop: 2}
  algorithms: [whca, orca_lite, dmpc_lite, mpc_cbf_lite, impc_dr_lite, clrr_hmpc, lcg_mpc_plus]
  n_jobs: 1

sweep:
  n_robots: [80, 100]
  map_type: [ring, bottleneck, intersection]
  density: [0.05]

scenario:
  width: 90
  height: 90
  obstacle_density: 0.05
  n_robots: 100
  task_mode: one_shot
  max_steps: 900
  start_goal_mode: cross_traffic

planner:
  horizon: 8
  whca_window: 8
  activation_mode: candidate
  clrr_nominal: whca
  deadlock_threshold: 6
  conflict_radius: 1
  communication_radius: 8
  retreat_radius: 6
  repair_astar_expansions: 2000
  max_game_agents: 5
  game_max_profiles: 512
  game_w_delay: 1.0
  game_w_retreat: 1.8
  game_w_fairness: 1.35
  game_w_progress: 1.1
  enable_mpc: true
  mpc_horizon: 6
  mpc_go_ratio: 0.70
  mpc_w_progress: 1.2
  mpc_w_wait: 0.25
  mpc_w_accel: 0.03
  enable_continuous_dynamics: true
  footprint_radius: 0.35
  safety_margin: 0.05
  sensing_sigma: 0.03
  uncertainty_k: 2.0
  max_speed: 1.25
  max_accel: 1.50
  enforce_acceleration_bound: true

runtime:
  verbose: false
  save_step_log: false
  resume_existing: true
