# V3 large-scale smoke only. Do not use for full statistical claims.
experiment:
  name: paper_500_1000robot_smoke_v3
  output_dir: results/paper_500_1000robot_smoke_v3/raw
  seed_range: {start: 0, stop: 29}
  algorithms:
    - whca_best_preregistered
    - mpc_cbf_lite
    - lcg_mpc_plus_full_v3
  n_jobs: 1

sweep:
  n_robots: [500, 1000]
  map_type: [ring, bottleneck, warehouse]
  density: [0.05]

scenario:
  width: 160
  height: 160
  obstacle_density: 0.05
  n_robots: 500
  task_mode: one_shot
  max_steps: 160
  start_goal_mode: cross_traffic

planner:
  whca_window: 8
  whca_strong_window: 16
  clrr_nominal: whca
  deadlock_threshold: 6
  repair_astar_expansions: 800
  max_game_agents: 4
  game_max_profiles: 64
  max_game_profiles_per_component: 64
  max_total_game_profiles_per_step: 192
  max_mpc_refinements_per_step: 2
  max_cbf_filter_calls_per_step: 1
  planner_step_timeout_ms: 300.0
  safe_fallback_on_timeout: true
  lcg_skip_whca_probe: true
  enable_mpc: true
  mpc_horizon: 4
  enable_continuous_dynamics: true
  footprint_radius: 0.35
  safety_margin: 0.05
  uncertainty_k: 2.0
  max_speed: 1.25
  max_accel: 1.50
  enforce_acceleration_bound: true

runtime:
  verbose: false
  save_step_log: false
  resume_existing: true
  claim_scope: "large-scale smoke only"
