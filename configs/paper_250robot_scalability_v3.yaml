# V3 reduced-seed 250-robot scalability validation.
experiment:
  name: paper_250robot_scalability_v3
  output_dir: results/paper_250robot_scalability_v3/raw
  seed_range: {start: 0, stop: 199}
  algorithms:
    - whca_best_preregistered
    - impc_dr_lite
    - mpc_cbf_lite
    - lcg_mpc_plus_full_v3
  n_jobs: 1

sweep:
  n_robots: [250]
  map_type: [ring, bottleneck, warehouse, intersection]
  density: [0.05]

scenario:
  width: 120
  height: 120
  obstacle_density: 0.05
  n_robots: 250
  task_mode: one_shot
  max_steps: 160
  start_goal_mode: cross_traffic

planner:
  whca_window: 8
  whca_strong_window: 32
  clrr_nominal: whca
  deadlock_threshold: 6
  repair_astar_expansions: 1000
  max_game_agents: 5
  game_max_profiles: 128
  max_game_profiles_per_component: 128
  max_total_game_profiles_per_step: 384
  max_mpc_refinements_per_step: 3
  max_cbf_filter_calls_per_step: 1
  planner_step_timeout_ms: 250.0
  safe_fallback_on_timeout: true
  lcg_skip_whca_probe: true
  enable_mpc: true
  mpc_horizon: 5
  enable_continuous_dynamics: true
  footprint_radius: 0.35
  safety_margin: 0.05
  uncertainty_k: 2.0
  max_speed: 1.25
  max_accel: 1.50
  enforce_acceleration_bound: true

runtime:
  verbose: false
  save_step_log: false
  resume_existing: true
  claim_scope: "reduced-seed scalability validation only"
